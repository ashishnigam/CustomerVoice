services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: customervoice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  analytics-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${ANALYTICS_POSTGRES_PORT:-55433}:5432"
    volumes:
      - analytics_pg_data:/var/lib/postgresql/data
      - ./superset/init-analytics.sql:/docker-entrypoint-initdb.d/01-init-analytics.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniopassword
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    command: sh -c "corepack enable && pnpm --filter @customervoice/api dev"
    environment:
      PORT: 4000
      AUTH_MODE: mock
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/customervoice
      REDIS_URL: redis://redis:6379
      ENABLE_BOOTSTRAP_SEED: "true"
      SEED_TENANT_ID: 11111111-1111-1111-1111-111111111111
      SEED_WORKSPACE_ID: 22222222-2222-2222-2222-222222222222
      SEED_USER_ID: 33333333-3333-3333-3333-333333333333
      SEED_USER_EMAIL: admin@customervoice.local
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis

  worker:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    command: sh -c "corepack enable && pnpm --filter @customervoice/worker dev"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/customervoice
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      WORKER_FROM_EMAIL: notifications@customervoice.local
    depends_on:
      - redis
      - postgres
      - mailhog

  web:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    command: sh -c "corepack enable && pnpm --filter @customervoice/web dev"
    ports:
      - "3333:3333"
    depends_on:
      - api

  superset:
    build:
      context: ./superset
    image: customervoice/superset:6.0.0-local
    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_DATABASE_URL: postgresql+psycopg2://superset:superset@analytics-postgres:5432/superset_meta
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-change-me}
      SUPERSET_PORT: ${SUPERSET_PORT:-8088}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_FIRSTNAME: ${SUPERSET_ADMIN_FIRSTNAME:-CustomerVoice}
      SUPERSET_ADMIN_LASTNAME: ${SUPERSET_ADMIN_LASTNAME:-Admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@customervoice.local}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    volumes:
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - ./superset/init-superset.sh:/app/init-superset.sh:ro
    command: ["/bin/sh", "/app/init-superset.sh"]
    depends_on:
      - analytics-postgres

volumes:
  pg_data:
  analytics_pg_data:
